<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting to priyan.info</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://priyan.info/">
  <meta http-equiv="refresh" content="0; url=https://priyan.info/">
  <script>
    (function () {
      var target = "https://priyan.info" + window.location.pathname + window.location.search + window.location.hash;
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <p>Redirecting to <a href="https://priyan.info/">https://priyan.info/</a>...</p>
</body>
</html>
